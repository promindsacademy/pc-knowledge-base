    {q:"GHL / Strive 系统文件命名规范是什么？（Rename SOP）",sop:"Rename SOP - 系统",who:"Wenji / Mok",tags:["rename","命名","格式","规范","yymmdd","ghl","strive"],notes:"格式：【YYMMDD】【Speaker】【Project Name】【Webinar/Offline】\n（建议英文，中文容易乱码）\n\n示例：\nGHL Site Funnel：（In Used）260319 Nicsman Pro Course Agency\nGHL Workflow：260319 Nicsman Pro Course Agency\nForm Name：（In Used）Nicsman Pro Course Webinar Agency - Form\nZapier：Nicsman Pro Course\nTagging：260319 Nicsman Pro Course\nStrive Contact List：260319 Nicsman Pro Course\nStrive Automation：260319 Nicsman Pro Course Auto"},
    {q:"Google Drive 广告素材怎么命名？（LP / 图片 / Video / 文案 / Reminder）",sop:"Rename SOP - 广告素材",who:"PC 监管 / Agency 执行",tags:["rename","命名","素材","广告","landing page","picture","video","caption","reminder","drive"],projectLinks:[{label:"📁 Sample【00】",url:"https://drive.google.com/drive/folders/1_XcpCQ2KFU6hMZoAG5fFB3lC600tj720"},{label:"📋 Labeling Instructions",url:"https://docs.google.com/document/d/1BDgi_V2IazgKcXNZKwytuCpj8nY1lj7b1PkeLX1tDQ8/edit"},{label:"📁 Project Drive",url:"https://drive.google.com/drive/folders/1zhJvTWF1w1l14BHlyPyxGAR6PIYIUUIl"}],notes:"【LP】iLovePDF 转 PDF\n格式：LandingPage_课程名_讲师缩写_OPTIN%\n示例：LandingPage_千万组织架构_MRJ_OPTIN12%\n\n【图片 Ads】直接 Upload\n格式：PictureAd_课程名_讲师缩写_CPL值_Lead数\n示例：PictureAd_团队不在继续跑_MRJ_CPL25_Lead19\n\n【Video Ads】VideoTranscriber.ai 转文字后 Upload\n格式：VideoAd_课程名_讲师缩写_CPL值_Lead数\n示例：VideoAd_解决销售团队遇到的瓶颈_MRJ_CPL20.63_Lead20\n\n【文案 Caption】存入单一 Google Doc\n格式：Caption_课程名_讲师缩写\n文档内每条：Video_影片名_Lead数_CPL值\n\n【Reminder】Google Drive\n格式：课程名_Reminder\n\n⚠️ PC 需定期 Check Agency 是否按规范命名\n如有问题发 Template Message 给 Agency 要求 12pm 前更新"},
    {q:"Strive WhatsApp 怎么发 Reminder？Blasting 5大规则是什么？",sop:"Strive Reminder & Blasting SOP",who:"Wenji",tags:["strive","whatsapp","reminder","提醒","blasting","规则"],sopLink:"https://worried-gambler-f97.notion.site/strive",notes:"1️⃣ Personalisation — 提名字\n2️⃣ Two-Way Chat — Reply *Ok* 表示知道\n3️⃣ Your Signature — From Prominds\n4️⃣ Allow Opt-Out — Reply *Stop*\n5️⃣ Exclude — 选 Tag，Opt-Out List\n6️⃣ Randomise Speed — 40~60 seconds"},
    {q:"Strive 完整 Setup Flow 在哪里？（注册/WA Coexistence/Inbox/Flowbuilder）",sop:"Strive Setup SOP",who:"Wenji / Nicsman",tags:["strive","setup","设置","coexistence","flowbuilder","inbox","crm","注册"],sopLink:"https://worried-gambler-f97.notion.site/Set-Up-WhatsApp-Business-API-in-Strive-CRM-31b736afa2e080b2b50acdd0346e087b",notes:"Step 1：注册账号 + 邀请团队\nStep 2：WA Coexistence Setup（需要手机号码 + Meta Business Suite）\nStep 3：Inbox Walkthrough + Quick Reply 设置\nStep 4：Flowbuilder Walkthrough\nStep 5：CRM Walkthrough\n\n💰 Blasting 费用：1000 msg = USD10（+8% SST）\nMarketing ≈ RM0.40/msg｜Utility ≈ RM0.05/msg\n\n⚠️ WA Personal 和 WA Coexistence 被 Restrict 几率一样高\n→ 遇到号码被限制，立即增加纯 API Blasting 号码作为备用"},

    {q:"Blast Message Failed 了怎么办？WA 被 Ban 怎么申诉？",sop:"WA Blasting 故障处理",who:"Wenji / Mok",tags:["blast","failed","ban","申诉","限制","whatsapp","blasting"],projectLinks:[{label:"📋 Blast Failed 处理",url:"https://boards.com/a/ywQMs.70Lk5c"},{label:"📋 Opt-Out 排除名单",url:"https://scribehow.com/viewer/How_to_Add_Contact_Opted_Out_into_List__Exclude_When_Broadcast__F8qxG1NZSuGVpSzZTQbsLg"},{label:"📋 WA Profile Settings",url:"https://worried-gambler-f97.notion.site/Update-WhatsApp-Profile-and-Message-Settings-31b736afa2e08047bfa1fbaee2f21626"}],notes:"WA Blasting 避免 Failed 7条规则：\n1. Msg 只保留 1 个链接\n2. 移除所有第三方号码/WA 号码（改用 Button）\n3. 替换高风险关键词（限流/变现/获客等）\n4. 减少 emoji 密度，避免重复 👉 和 ❌\n5. 同一天最多发 2 封，间隔 ≥ 3 小时\n6. Filter 名单，优先发给有互动记录的 leads\n7. 定期检查 Phone Number Quality Rating（最好是 ✅ High）\n\n⚠️ 每个号码 24小时内最多收 6 封 Marketing Msg\n\n【WA 被 Ban 申诉模板】\nDear WhatsApp Support Team, I am writing to you with a sincere and humble request to review the ban on my WhatsApp account associated with the number [Your Full Phone Number]. I understand that my account usage may have violated the platform Terms of Service, and I take full responsibility for that error. This number is my main point of contact. I am committed to being a responsible user and promise to adhere strictly to all WhatsApp rules. Thank you for considering lifting the ban. Respectfully, [Your Name]"},

    {q:"Payment Link 怎么设置？（Senang Pay / Payex Ezbeli）",sop:"Payment Setup SOP",who:"SzeYuan / Mok",tags:["payment","付款","链接","支付","senang pay","payex","ezbeli","stripe"],notes:"Generate Payment Link 需要准备：\n1. 图片（要有头像，建议有标题，不要纯 Logo）\n2. 课程名称（英文）\n3. Product Description（英文）\n4. Price 价钱\n5. Price + 8%（实际 Amount for Installment）\n\nEzbeli 过不了常见原因：\n1. 信用卡 Limit 不足\n2. Approve 了 Payment 但没有 back to merchant（Ezbeli）\n3. Time Out — 需要用两个 Device（一个购买，一个收 OTP）\n\nEzbeli 支持分期银行：\nMaybank / CIMB / UOB / Public Bank / HSBC / Standard Chartered / Hong Leong / AmBank / RHB / OCBC / Affin Bank\n\n🆘 紧急备用 Stripe Link（Senang Pay 出问题时用）：\nhttps://buy.stripe.com/00w4gzdQ4b7MdIa1y0ejK0M\n⚠️ 用完后必须手动在 Student List 补录该学员，Stripe 不会自动录入"},

    {q:"WhatsApp Community 怎么建立？名字/图片/Description 怎么设？",sop:"Create WA Community SOP",who:"Wenji",tags:["whatsapp","community","群","建立","名字","description"],notes:"Community Group 命名格式：\n[ Date ] + [ Course Name ] 线上分享会\n示例：23 July | 《企业财务战略》 线上分享会\n\nCommunity Image：Speaker 图 + Logo\n\nCommunity Description 必须包含：\n- 日期 + 时间\n- 这个群是关于什么的\n- 有问题找谁"},

  {category:"数据 & 报表",icon:"📊",items:[
    {q:"怎么算 ROAS / CPL / CPA？",sop:"数据计算公式表",who:"Louis / Niysha",tags:["roas","cpl","cpa","计算","公式","数据"],notes:"ROAS = 总收入 Sales Collection ÷ 广告总花费（越高越好）\n例：RM5,000 广告费，Collection RM20,000 = ROAS 4.0\n\nCPL = 广告总花费 ÷ 获取到的 Leads 数量（越低越好）\n例：RM10,000 广告费，250 Leads = CPL RM40\n\nCPA = 广告总花费 ÷ Student 总人数（越低越好）\n例：RM5,000 广告费，10人下单 = CPA RM500"},
    {q:"P&L 表格怎么填？",sop:"P&L 填写 SOP",who:"SzeYuan / Mok",tags:["p&l","pnl","损益","填写","报表","财务"],notes:"P&L 结构：Front End + Back End\n\n填写步骤：\n1. 【Collection】去各项目 Student & Payment List\n   计算当月总 Collection\n   ⚠️ 有些项目只计算 Full Amount，排除 Deposit\n\n2. 【Transaction Charge】计算总额，记得放负数（-）\n\n3. 【Ads Spend / Blasting / Other Cost】\n   提醒 Agency 填写：linkc.co/pnl\n   到 PAP Monthly Costing P&L (Responses) 检查 Attachment\n   Double confirm WA Blasting 计算\n   → 搜索「WA Blasting 费用计算」查看计算方式\n\n4. 【Other / Closer Comm / Referral Fee】自行先确认\n\n5. 【Speaker / Agency P&L】完成后 double confirm（如有）\n\n6. 【Profit Distribution】⚠️ 最重要\n   必须确认 Percentage 和 +/- 格子 + Formula 正确\\n\\nP&L 完成后颜色标记：\n• 填完当月 → 将该月份标题改成白底黑字（表示已记录完成）\n• Mok 检查无误后 → lock 该月份，变成蓝底白字，不再修改\n• 有疑问主动找 Mok 确认 🙏"},
    {q:"广告数据在哪里看？",sop:"Agency 数据查看指引",who:"Louis",tags:["广告","数据","后台","meta","ads"],notes:"每天查看 WA Daily Ads Update Report（Agency 发送）\n完整记录在各项目的 Ads, Sales Tracking Sheet 当中"},
    {q:"Sales Tracking 怎么更新？",sop:"Sales Tracking SOP",who:"PC 监督 / Agency 更新",tags:["sales","tracking","销售","追踪","更新"],notes:"每个项目都有专属的 Ads, Sales Tracking Sheet\nSheet 内分多个 Tab：\n• Performance Report — 整体数据汇总\n• Ads Tracking (Ads) — 每日广告追踪\n• Showup / Showup 2 Days — 出席率追踪\n\nPerformance Report 记录：\nAds Spent / No. of Registers / CPR / Show Up Rate / Max Show Up Pax /\nShow Up Into Closing / Conversion Rate /\nStudent Purchase (OnTheSpot + Follow Up) /\nCPA / ROAS / Course Price / Cash Collection /\nGross Profit Before Tax (GPBT) / Gross Profit After Tax (GPAT)\n\n⚠️ Deposit 不会记录进 Student Pax"},
    {q:"Ads Tracking 每日怎么更新？（每天12点前）",sop:"Ads Tracking SOP",who:"Louis",tags:["ads","tracking","每日","12点","更新","广告"],notes:"⏰ 每天 12:00pm 前必须更新完毕\n\n在各项目 Ads, Sales Tracking Sheet → Ads Tracking (Ads) Tab\n\nAgency 每天 12pm 前填写：\n• FB Ads Spend（当天花费）\n• Total Ad Spent 累计\n• No. of Leads（当天）\n• CPL（当天）\n• Active Ads 数量（X Campaign X Ads）\n• Landing Page Conv. Rate\n\nPC 负责监督 + 协调，确保 12pm 前更新完毕"},
    {q:"Weekly Report 怎么写？",sop:"Weekly Report 模板",who:"PC 自行完成",tags:["weekly","report","周报","汇报"],url:"https://docs.google.com/spreadsheets/d/1MAUrfjIOeuaOhl2vIw2kPg9WAafWdYZh8DXxVf4w0yk/edit?gid=241065549#gid=241065549",notes:"两件事要做：\n1. 填写 Weekly SPRA War Room（10分钟内，要数据，不需要很复杂）\n2. 更新数据到 PromindsAI Dashboard → promindsai.com"},
    {q:"Webinar 结束后汇报格式是什么？（Post-Webinar Report）",sop:"Post-Webinar Report 模板",who:"Louis / Mok",tags:["report","汇报","webinar","结束","summary","roas","gp","collection"],notes:"Summary\n课程：\nDate/Month：\n\n【Report】\nAds Spend：\nLeads：\nCPL：\nL.P Conv.R：\nMax Show Up：\nAttendance Rate：\nROAS：\nStudent Sign Up：\nCollection：\nGPBT：\nGPAT：\n\n【Observe / Suggestion】\nO：（观察到什么）\nS：（建议是什么）\n\n【What's Next】\n*（下一步行动）"},
    {q:"Agency Ads Daily Update 格式是什么？（PC 追踪用）",sop:"Ads Daily Report 模板",who:"Louis / PC 执行",tags:["daily report","agency","ads","update","cpl","leads","每日"],notes:"*DAILY REPORT*\nCourse：\nOnline/Offline：\nEvent Date：\nYesterday Date：\nAds Spend：\nCPL：\nLeads：\nLanding Page Conv.：\n\nAccumulate 累计：\nAds Spend：\nCPL：\nLeads：\nTotal Landing Page Conv.："},
  ]},
  {category:"Webinar 执行",icon:"🎯",items:[
    {q:"跑广告期间每天要做什么？（Running Ads Period）",sop:"Running Ads Period Checklist",who:"Louis / PC 执行",tags:["running ads","广告","期间","checklist","lp","slide","community"],notes:"【Landing Page & Thank You Page】\n✅ 改日期\n✅ 更新 WA Community（如需要）\n\n【Ads Content】\n✅ 每轮新广告 5-6 条\n✅ Opt-In Rate 追踪\n\n【Ads Tracking】\n✅ 每天 12pm 前更新\n\n【素材命名 Check】\n✅ 确认 Agency Drive 素材命名符合规范（LP / 图片Ads / VideoAds / 文案 / Reminder）\n✅ 有问题发 Template Message 给 Agency，要求 12pm 前更新\n\n【Slide】\n✅ 内容 / Pitching Offer / Testimonial Video / 等待付款视频\n\n【社群管理】\n✅ 开播前3天：Knowledge / Pain Point / News\n✅ 开播前1天：Calling\n\n【CS 确认】\n✅ QR Code & Link / Payment Link / 课程内容 & Bonus & Testimonial"},
    {q:"Webinar 前一天要检查什么？（Before Webinar）",sop:"Pre-Webinar Checklist",who:"Wenji 协助检查",tags:["webinar","前一天","检查","checklist","准备","zoom","reminder"],notes:"【Zoom Link 准备】\n✅ 提前1周/1个月设置，名称：课程名 + 日期\n✅ 有 Meeting Code + Password，加进 Reminder 消息\n✅ 发进 Speaker / Marketing WA 群，加进 Google Calendar\n\n【Zoom 设置】\n✅ 名称（XXX 分享会/实战/培训营）\n✅ 时间（7:45pm - 10:30pm）GMT+8\n✅ Waiting Room + Passcode，Mute participants upon entry\n\n【Pre-Zoom 准备清单】\n✅ LOGO 更新\n✅ Disable Annotation / Participant Unmute / AI Companion\n✅ 录影设置（Zoom Cloud / Device / OBS）\n✅ 10min Sheet（设闹钟）\n✅ Pitching Msg / Congratz Msg / 15min Opening Video 确认\n\n【Update Speaker】\n✅ Ads Spend + 预计出席人数 / Slide 修改确认\n✅ 网络 / 背景 / 仪容 / 设备确认\n\n【Reminder Message 时间】\n✅ 个人 Blasting：12pm / 2pm / 约8pm\n✅ WA Community：7:30pm / 7:45pm / 8pm\n✅ Zoom Waiting Room：7:45pm 前"},
    {q:"Webinar 当天操作流程？（During Webinar）",sop:"Webinar Day SOP",who:"PC 执行",tags:["webinar","当天","操作","流程","zoom","during"],notes:"【Reminder Message】\n✅ WA Community：8:10pm / 8:20pm / 8:30pm\n✅ Boost Community：8:40pm / 8:50pm / 9pm\n\n【Zoom Support】\n✅ 15min Opening Video 流畅播放\n✅ 开始时关闭 Waiting Room\n✅ Chat / Notice 互动，违规处理\n\n【Attendance Tracking】\n✅ 每10分钟记录一次（设闹钟），备注 Stay & Drop 原因\n\n【Closing Part】\n✅ Pitching 消息 / 客服 WA / Congratz 消息 / WA 群更新\n\n【Q&A Part】\n✅ Spotlight 学员，制造紧迫感，记录 Potential 学员"},
    {q:"Webinar 结束后要做什么？（After Webinar）",sop:"Post-Webinar Checklist",who:"PC + Bowie",tags:["webinar","结束","after","follow up","cs","review"],notes:"【CS 跟进】\n✅ Follow Up 销售 — Webinar 结束后 1天内\n✅ 更新 Student List / Payment List\n✅ 把学员加进 WA Group\n\n【Review】\n✅ 内部 Weekly Review\n✅ 与 Prominds Bi-Weekly Review\n\n汇报格式 → 搜索「Post-Webinar Report」查看完整模板"},
    {q:"一场 Webinar 成绩不好怎么分析？（3步诊断框架）",sop:"Webinar 成绩分析框架",who:"Louis（策略）/ Mok（项目方向）",tags:["webinar","分析","诊断","cpl","attendance","conversion","成绩","不好","优化"],notes:"原则：以结果为导向，哪里出问题修哪里，不是补洞，是优化。\n带分析结果 + 你的建议，再找 Louis 讨论。裸问题 = 退回。\n\n【第一步：CPL 高 / Leads 少？】\n广告层面：素材错 / Target 错 / 投放方式错 / Scale 太快素材跟不上\nLanding Page：信息不足 / 没解决痛点 / 无 CTA / 步骤繁琐\nLP Opt-In Rate：正常水平 10% 以上，做 A/B Test（长版 vs 短版）\n外部因素：节日 / 长假 / 出游旺季 → 目标人群不在线\n\n【第二步：Attendance Rate 低？】\nReminder：要说服对方出席，不只是提醒，文案要有温度\nCompetitor：检查同赛道是否有对标讲师同期开课\nLead Magnet：笔记 / Bonus / 小礼物 / Sales Kit PDF 吸引留到结尾\nCRM：有没有养好社群，偶尔提供干货？\n日期：最佳周二~四，避开周一（Monday Blue）/ 周五（塞车）\n\n【第三步：Conversion Rate 低？】\n讲师状态：当天状态好不好？有没有提前 Brief 今晚情况（人数/行业/主题）\nPitching 节奏：Closing 是否顺畅？Testimonial 够不够？故事有没有引导报名？\nSlides 内容：干货太多没铺垫？敢不敢卖？有没有彩排？\nObjection Handle：\n  ❌ 太自以为是 / 思考太久 / 直接全解答（学员不需要报名了）\n  ✅ 要引导，不是直接给答案\nLeads 质量：广告对象错误，CPL 便宜但来的人需求不同\n  → 检查广告 Target + Slide 内容是否 Align"},
    {q:"Caller Tracking & Follow Up 在哪里记录？",sop:"Caller Tracking & Follow Up Template",who:"Bowie / Louis",tags:["caller","tracking","follow up","call","upsell","跟进","记录","追单"],url:"https://docs.google.com/spreadsheets/d/1EFR8j6aaPwwGJZCEwz9MAwHDuMsmfxnH9r3z153qza4/edit?gid=1575348295#gid=1575348295",notes:"适用于以下情况：\n• Webinar 前 Call（Pre-Webinar Call）\n• Follow Up 买课\n• 3天课后 Upsell\n\n统一在此模板记录，确保不遗漏任何跟进记录"},
    {q:"Transcript 怎么归档？（Webinar 结束后）",sop:"Transcript 归档 SOP",who:"Wenji",tags:["transcript","归档","录音","文字","sop","记录","upload","vtt","txt","md"],url:"https://docs.google.com/spreadsheets/d/1-OZEkbumrBAkrPFUBKdxqpPzLxGbpWY3hL5L_fP7o8Y/edit?gid=1675120898#gid=1675120898",projectLinks:[{label:"📊 Transcript 集中区",url:"https://docs.google.com/spreadsheets/d/1-OZEkbumrBAkrPFUBKdxqpPzLxGbpWY3hL5L_fP7o8Y/edit?gid=1675120898#gid=1675120898"},{label:"💬 PC Task & Report",url:"https://chat.whatsapp.com/L8rBkQrMVRxFuPNLK2YtPR"}],notes:"3步完成 Transcript 归档：\n\n第一步（24小时内）— 获取与处理\n从 Zoom / 录制平台下载 .vtt 或 .txt 文件\n\n第二步 — 命名规范\n格式：YYYYMMDD_Speaker_Course_Language/OtherRemark\n示例：20260410_Nicsman_ProCourse_CN Webinar\n❌ 禁止：123.txt、Nicsman讲课记录.docx 等无规范命名\n\n第三步（当下）— 归档与登记\n1. 上传文件到指定 Google Drive Folder\n2. 复制链接，回填至【Record】Tab\n3. 在【PC Task & Report】回复：已完成 XX 项目的Transcript 记录"},
    {q:"怎么发 Reminder 给学员？",sop:"Reminder SOP",who:"Agency 执行 / PC 可立即执行",tags:["reminder","提醒","学员","发送","strive"],notes:"执行方：一般由 Agency 负责\nPC 在需要时可立即执行（以结果为主）\n\n参考素材：\n→ 查看各项目的 Moderator Tools（里面有 Sample + 实际案例）\n\n发送时机：根据 Strive SOP 设定的时间点执行\n\n自动化：\n→ 学员填 LP Form 后 → 自动触发第一封 Welcome Message\n→ 在 GHL → Zapier → Strive 里设置"},

  {category:"学生 & 课程",icon:"🎓",items:[
    {q:"学生 Onboarding 流程？",sop:"Student Onboarding SOP",who:"Bowie / Wenji",tags:["学生","onboarding","入学","通知","名单"]},
    {q:"3天课前要准备什么？Phase 1 — 课程前准备（D-10 起）",sop:"Prominds 3天课程前准备 Checklist v1 — Phase 1",who:"Mok / Wenji / Louis / PC",tags:["3天","课前","checklist","phase 1","准备","d-10","大纲","survey","testimonial","sales kit","payment","closer","zoom","后端","back end","课程执行","offline","event"],notes:"Phase 1：课程前准备（课程前 7-10 个工作天）\n\n🔴 必须完成\n☐ 1. 课程大纲制作（3~5 个关键模块）→ Louis / PC | D-10\n   产出：PDF + Slide 初稿\n\n☐ 2. Survey Form（学生资料表）— 了解年龄、职业、痛点、消费能力、预期等 → PC | D-7\n   产出：GHL Form + Zapier 自动流向 Sheet\n\n☐ 3. WhatsApp 课程群建立 + 群规 → PC | D-7\n   群规：禁私下推销、开通知、禁分享到 Public\n   产出：Group 创建、Admin 设置、首条群规 Post\n\n☐ 4. Testimonial 素材包准备（至少 5~8 条，标注讲师名字 + 故事）→ Louis / Wenji | D-7\n   产出：Excel 表：说话者、金额/成果、原文、截图\n\n☐ 8. Sales Kit & Upsell 课程详情 + 价格表（含 Bonus 清单）→ Louis / Jeremy | D-5\n   产出：PDF 销售资料 + Bonus 产品清单\n\n☐ 9. Payment Link 配置（Stripe / GHL Payment Form + Backup 方案）→ PC | D-5\n   产出：Live Payment Link + Bank Transfer Backup\n\n☐ 10. Closer 团队安排（指派 1~2 名 Closer + Backup）→ Mok / Wenji | D-5\n   产出：Closer 名单 + 联系方式 + Closing Script\n\n☐ 12. Zoom 设置 + 一键启动清单 → PC / KaHung | D-5\n   产出：Zoom 会议 ID、Background、Polls 预设、Chat 规则\n\n☐ 13. Event Day Checklist（Day 1/2/3 用）→ PC | D-3\n   参考「3天课 Event Day 每日怎么执行？」\n\n🟠 高优先\n☐ 5. 30分钟 Countdown Video → Wei Yi | D-5\n   产出：MP4 竖屏版 + 横屏版（Zoom 用）\n\n☐ 6. 课程大纲 + 功课/Workbook（搭配讲师教学内容）→ Louis / Jeremy | D-5\n   产出：PDF 版本（可打印）+ 在线 Link\n\n☐ 7. 讲师信任度 Build 视频/素材（讲师自我介绍、Past Results）→ 讲师 / Wenji | D-7\n   产出：3~5 分钟视频或 1 页文字\n\n☐ 11. Closing Script / Angle（每天不同角度）→ Louis | D-3\n   Day 1: 破冰 | Day 2: 证明 | Day 3: 截止\n   产出：Word / Slides 脚本\n\n☐ 14. Testimonial 收集流程（谁负责问、什么时间、什么格式）→ CS / Bowie | D-5\n   产出：WhatsApp Template + 提醒 Reminder\n\n☐ 15. Post-Course Follow-up Plan（Interview 安排、Upsell L3 Closer Sheet）→ CS / Bowie | D-3\n   产出：Interview Scheduling Link + Schedule Calendar / Calendly\n\n🟡 中优先\n☐ 16. 积分/奖励机制确认（哪些行为加分：出席、互动、完成功课）→ Louis / PC | D-5\n   产出：积分表 + 大奖描述"},
    {q:"3天课 Event Day 每日怎么执行？Phase 2 — Day 1/2/3 Checklist",sop:"Prominds 3天课程前准备 Checklist v1 — Phase 2",who:"PC / Wenji / CS / Bowie",tags:["3天","event day","day 1","day 2","day 3","执行","checklist","phase 2","zoom","closing","payment","testimonial","后端","back end","课程执行","offline"],notes:"Phase 2：Event Day 执行（每日跑完）\n\n⏰ Morning -1h\n☐ Zoom 设置检查 → PC / Wenji\n   确认：会议室已开、Background OK、Polls Ready、Co-host 确认\n\n⏰ Morning -45min\n☐ 讲师 Briefing → Wenji / PC\n   确认：讲师进 Zoom、Mic 测试、Agenda 再确认\n\n⏰ Morning -30min\n☐ 30分钟 Countdown Video 播放 → PC\n   确认：网络稳定、Video 播放有声音、画质不影响太多\n\n⏰ Morning 开课\n☐ 开课 + 记录开始时间 → PC\n   确认：所有学生到位、Attendance 点名、开始 Record\n\n⏰ Mid-Morning\n☐ 积分记录（如有竞赛环节）→ PC\n   确认：实时更新 Sheet / Whiteboard\n\n⏰ Before Lunch\n☐ 讲师确认 Lunch Meal + 下午流程 → PC\n   确认：提早准备午餐（确认素食 & 敏感食物），让讲师知道下午的 Closing Pitch（如有）\n\n⏰ Afternoon -1h\n☐ Closer 预热 → CS / Closer\n   确认：Closer 进 Zoom、Sales Kit 确认、Payment Link 测试\n\n⏰ Afternoon Closing\n☐ 1st Closing（Day 1/2）/ 2nd Closing（Day 3）→ Closer\n   确认：讲师配合、Script 执行\n   产出：Closer Interview + Payment Report（成交数 / 未成交数 / 理由）\n\n⏰ After Closing\n☐ 成交学生 Payment Link 确认 → CS\n   确认：Payment 已到账 / 需要 reminder（2-3 次）\n\n⏰ Evening\n☐ 当日 Closing 数据统计 + GP 初步计算 → PC / SzeYuan\n   确认：Revenue 录入 Sheet、Refund 记录、成本记录\n   产出：Daily P&L Snapshot\n\n⏰ Evening Post\n☐ Testimonial 收集（问成交的学生【为什么决定成交】）→ CS\n   目标：至少采集 3~5 条，Word 记录\n\n⏰ Class End\n☐ 器材整理 + 充电 → PC\n   确认：Zoom 录制存档、Slides 保存、设备关闭\n\n☐ 学生任务发布（Post Social Media + 功课 + 课后问卷）→ PC / CS\n   确认：任务清单发送、截止时间明确\n\n⏰ Next Morning\n☐ 昨日学生跟进（谁没交功课、谁没发 Social、谁表示想退款）→ CS / PC\n   产出：更新在相关 Group（Student / Speaker / Task & Report）",sopLink:"https://worried-gambler-f97.notion.site/Training-Dato-Keen-3-Day-Online-Class-Support-241736afa2e0805bbae4dee5216013a2"},
    {q:"3天课结束后要做什么？Phase 3 — 课后跟进（7天内）",sop:"Prominds 3天课程前准备 Checklist v1 — Phase 3",who:"CS / Bowie / PC / Mok / SzeYuan / Louis",tags:["3天","课后","phase 3","follow up","refund","upsell","interview","p&l","spra","testimonial","后端","back end","课程执行","offline"],notes:"Phase 3：课程后跟进（课程结束后 7 天内）\n\n🔴 必须完成\n☐ 1. 最终 Closing（Day 3 Evening）+ 3rd Closing 看情况 → Closer / CS | D+0\n   产出：最终成交数、未成交原因分析\n\n☐ 2. Refund 申请处理（3 天内回复）→ CS / Bowie | D+3\n   产出：批准/拒绝 + 原因记录在 Sheet\n\n☐ 3. 成交学生入组/送 Bonus → CS / PC | D+1\n   确认：Course Access 确认、Bonus 已投递\n\n☐ 10. P&L 最终结算 + GP Review → SzeYuan / Mok | D+5\n   产出：完整 P&L + vs 目标对比、偏差分析\n\n☐ 11. L3 Performance Analysis（每次课程的数据）→ PC / Mok | D+2\n   确认：Attendance、Revenue Per Head、Interview + Collection Rate\n\n☐ 12. 讲师分润结算（Invoice、Tax、Bank Transfer）→ SzeYuan | D+7\n   确认：讲师已收款确认\n\n🟠 高优先\n☐ 4. 未成交学生 WhatsApp Follow Up（失败原因分析 + 一次补救 Offer）→ CS / Bowie | D+2\n   确认：信息已发、确认 Follow Up 记录\n\n☐ 5. Interview 安排（Interview Booking Link）→ CS / Bowie | D+1\n   目标：至少 50% 成交学生约上 Interview（为未来 Upsell）\n\n☐ 7. 讲师 Feedback Debrief → Mok / Wenji | D+3\n   产出：讲师反馈单页 + 改进点 for 下一轮\n\n🟡 中优先\n☐ 6. 课程反馈问卷 + NPS（讲师表现、内容评价、建议）→ PC | D+2\n   目标：Survey 回收率 >70%、NPS 记录\n\n☐ 8. Testimonial 最终包装（精选 3~5 条 + Video Testimonial）→ Louis / Wenji | D+5\n   产出：Testimonial 视频或精美海报\n\n☐ 9. 成交学生 Social Proof 内容生产（Before/After、成交理由贴）→ Louis / PC | D+5\n   产出：3~5 条 Post-ready 内容\n\n---\n关键系统对接：\n• Google Sheet SPRA War Room — Revenue / Attendance / Conversion\n• GHL Survey Form → Zapier — 学生报名信息自动流入\n• Strive WhatsApp API — 自动发 Reminder（课前/Countdown/追缴 Payment）\n• Manus AI — 自动计算每日 P&L\n• Google Drive 共享夹 — Video / Slides / Testimonial / Scripts 存档"},
    {q:"WA Personal vs WA Community 分别用来做什么？",sop:"WA 使用指引",who:"Bowie",tags:["wa","whatsapp","personal","community","用途","区别"],notes:"WA Personal = 关系（追单 / 关心 / 发笔记）\nWA Community = 氛围（规则 / 自我介绍 / Testimonial）"},
    {q:"发给学生的 LMS 登录模板是什么？",sop:"Student LMS 登录 Template",who:"Mok",tags:["lms","学生","登录","模板","template","recording","promindsapp","录影"],sopLink:"https://www.notion.so/Student-Start-Learning-in-Prominds-SuperApp-2f6736afa2e080e5a9eac563ee995b67",notes:"发送前替换 [日期] 和 [课程名称]\n\n[日期]\n[课程名称] 3天 Online Recording\n\n🎈 student login: https://promindsapp.com/\n\n请学生完成以下步骤，就可以复习了。\n1. 点击链接：右上角 Sign In 🔗\n2. 输入自己的 Email\n   【已经有 Prominds Account 的可以直接 Sign In】\n3. Default 的密码：BeProminds\n4. 设置你自己的新密码\n5. 选择 —— [课程名称] [日期]\n6. Start Learning\n7. 可以看 Recording 了 😇\n\np/s：如果无法登录，请提供你的 Email 给客服哟 😁\n\n可以查看教学链接 🔗：\nhttps://www.notion.so/Student-Start-Learning-in-Prominds-SuperApp-2f6736afa2e080e5a9eac563ee995b67\n\n⚡ 温馨提醒：\n回放日期开放到 [日期]（[星期]）就会关闭。"},

    {q:"Agency Onboarding 完整流程是什么？（PAP Onboard 7步）",sop:"PAP Agency Onboarding SOP",who:"Mok（1-2步）/ Wenji / PC（3-7步）",tags:["agency","onboarding","pap","流程","template","步骤"],notes:"Step 1（Agreement完成/无项目）：\n告知协议 OK，等合适项目，预告会开 Group\n\nStep 2（Agreement完成/有项目）：\n告知协议 OK + 预约 Training Video + WA Group\n\nStep 3（Intro）：\n介绍 Prominds 团队（Nicsman/Mok/SY/Louis/Chin Ni）\n\nStep 4（加入 PAP WA Group）：\n收集 Agency 名字/电话/Email，加入 PAP 总群\n（PAP群内容：Support / Training / Announcements / 创意交流）\n\nStep 5（提供项目）：\n说明项目安排，预约 Zoom 或现场讨论 Setup\n（介绍PC / 了解项目情况 / 设置前期作业 / 广告状态 / Webinar流程）\n\nStep 6（两个 Main Group）：\n① Speaker x Agency x Prominds：【Speaker Prominds Course】协调讲师\n② Agency & Prominds（Internal）：【Speaker / Course Marketing】内部讨论\n\nStep 7（Onboard Checklist 14+1项）：\n见「Onboard Agency Checklist」条目"},
    {q:"Onboard Agency Checklist 是什么？（开始跑广告前）",sop:"Onboard Agency Checklist",who:"Mok / Wenji",tags:["agency","checklist","onboard","开始","广告","launch"],notes:"Speaker Course Progress — Target to launch ads on DD MM YYYY\n\n✅ 1. Budget\n✅ 2. Landing Page\n✅ 3. Lead Sheet & Automation\n✅ 4. Meta Ad Acc 1\n✅ 5. Meta Ad Acc 2\n✅ 6. Prominds General PX Pixel\n✅ 7. Facebook Page\n✅ 8. WA API Phone Number\n✅ 9. Strive × Welcome Message\n✅ 10. 15 Minutes Video\n✅ 11. Lead Magnet & Reminder\n✅ 12. Payment Link\n✅ 13. Zoom\n✅ 14. Community WA Group\n✅ 15. 发送 Drive 素材命名规范 + Sample + Tutorial 链接"},
    {q:"项目有几个 Main Group？分别是什么？",sop:"项目 WhatsApp Group 架构",who:"Mok / Wenji",tags:["group","群","main","speaker","agency","prominds","内部","协调"],notes:"每个项目有两个 Main Group：\n\n1️⃣ Speaker × Agency × Prominds\n群名：【Speaker Prominds Course】\n用途：协调讲师 / 资料收集 / 日期确认\n\n2️⃣ Agency & Prominds（内部）\n群名：（Internal）【Speaker / Course Marketing】\n用途：讨论广告 / Operation / Software Link（PAP 内部）"},
    {q:"Onboard 新讲师的消息模板是什么？",sop:"Speaker Onboarding 消息模板",who:"Mok",tags:["讲师","onboarding","消息","模板","template","新讲师","speaker"],notes:"Hi 大家好，我是Mok From Prominds 🚀\n\nProminds Team：\n- Nicsman（CEO）\n- Mok（Operation）\n- SY（Finance）\n- Louis（Performance Strategy）\n- Chin Ni（Branding）\n\n需要讲师准备的资料：\n1. Full or half-body pictures (2)\n2. Personal details and qualifications\n3. Personal success story or results\n4. Awards, achievements, or media interviews\n5. Pictures from previous courses (20~50)\n6. Testimonials (Students, Partners)\n7. Business page for reference\n8. Specific artwork for reference (if any)"},
    {q:"阶段 1：Speaker Kit 讲师资料怎么收集？",sop:"SOP 1.0 Speaker Kit",who:"Mok",tags:["speaker kit","讲师","资料","收集","google drive"],notes:"Mok 开 Google Shared Drive：【名字 Speaker 资料】\n加 Prominds Email 进 Drive 主文件夹\n\n需收集：\n✅ 专业照片（全身/半身 x2）\n✅ 个人资料 & 资历\n✅ 个人成功故事 & 成果\n✅ 奖项 / 媒体采访\n✅ 课程照片（20~50 张）\n✅ Testimonials（学员/合作伙伴）\n✅ Business Page 链接\n✅ 特定设计参考（如有）"},

1. 消息只保留 1 个链接

// ── UI Functions ───────────────────────────────────────────────
function toggleChat() {
  isOpen = !isOpen;
  const panel = document.getElementById('ai-panel');
  const badge = document.getElementById('ai-badge');
  const fabIconDefault = document.querySelector('#ai-fab svg:first-child');
  const fabIconChat = document.getElementById('fab-icon-chat');
  if (isOpen) {
    panel.classList.add('open');
    badge.style.display = 'none';
    fabIconDefault.style.display = 'none';
    fabIconChat.style.display = 'block';
    setTimeout(() => document.getElementById('ai-input').focus(), 100);
  } else {
    panel.classList.remove('open');
    fabIconDefault.style.display = 'block';
    fabIconChat.style.display = 'none';
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
}

function quickAsk(text) {
  document.getElementById('ai-input').value = text;
  sendMsg();
}

function scrollToBottom() {
  const msgs = document.getElementById('ai-messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function appendMsg(role, content) {
  const msgs = document.getElementById('ai-messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar ' + (role === 'assistant' ? 'ai' : 'user');
  avatar.textContent = role === 'assistant' ? 'AI' : 'PC';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble ' + role;
  if (role === 'thinking') {
    bubble.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    bubble.className = 'msg-bubble thinking';
    row.className = 'msg-row assistant';
  } else {
    bubble.innerHTML = content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  }
  if (role !== 'user') row.appendChild(avatar);
  row.appendChild(bubble);
  if (role === 'user') row.appendChild(avatar);
  msgs.appendChild(row);
  scrollToBottom();
  return row;
}

// ── API Call ───────────────────────────────────────────────────
async function sendMsg() {
  if (isLoading) return;
  const input = document.getElementById('ai-input');
  const sendBtn = document.getElementById('ai-send');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  appendMsg('user', text);
  chatHistory.push({ role: 'user', content: text });

  const thinkingRow = appendMsg('thinking', '');
  isLoading = true;
  sendBtn.disabled = true;

  // Hide quick prompts after first use
  document.getElementById('ai-quick').style.display = 'none';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 1024,
        system: SYSTEM_PROMPT,
        messages: chatHistory
      })
    });

    const data = await res.json();
    if (!res.ok) {
      const errMsg = data?.error?.message || data?.type || res.status;
      throw new Error('API Error ' + res.status + ': ' + errMsg);
    }
    const reply = data?.content?.[0]?.text || '抱歉，未收到回复，请重试。';
    chatHistory.push({ role: 'assistant', content: reply });
    thinkingRow.remove();
    appendMsg('assistant', reply);
  } catch (err) {
    thinkingRow.remove();
    appendMsg('assistant', '⚠️ 连接出错：' + err.message + '\n\n请检查网络或稍后重试。');
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }
}

// Show badge after 3 seconds if chat not opened

  if (!isOpen) {
    document.getElementById('ai-badge').style.display = 'flex';
    document.getElementById('ai-badge').textContent = '✦';
  }
}, 3000);
</script>
