              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:"#222",lineHeight:1.4}}>{item.icon} {hi(item.q,query)}</div>
                  {item.escalation&&<span style={{display:"inline-block",marginTop:5,padding:"2px 9px",borderRadius:4,fontSize:11,fontWeight:700,background:`${EC[item.escalation]}15`,color:EC[item.escalation]}}>{EL[item.escalation]}</span>}
                </div>
                <span style={{fontSize:14,color:"#BBB",transform:open?"rotate(180deg)":"none",transition:"transform 0.2s",marginLeft:8,marginTop:2}}>▾</span>
              </div>
              {open&&(<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #F0F4F8",fontSize:13,lineHeight:1.7}} onClick={e=>e.stopPropagation()}>
                <div style={{display:"grid",gridTemplateColumns:"82px 1fr",gap:"7px 10px",alignItems:"start"}}>
                  <span style={{fontWeight:700,color:"#1F4E79",fontSize:12}}>📄 SOP</span>
                  <span>{item.sop}{item.sopLink&&<a href={item.sopLink} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{marginLeft:8,padding:"2px 8px",borderRadius:4,background:"#1F4E79",color:"white",fontSize:11,fontWeight:700,textDecoration:"none"}}>查看 →</a>}</span>
                  {item.url&&<React.Fragment><span style={{fontWeight:700,color:"#1F4E79",fontSize:12}}>🌐 网址</span><a href={item.url} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{color:"#1F4E79",wordBreak:"break-all"}}>{item.url}</a></React.Fragment>}
                  {item.loginId&&<React.Fragment><span style={{fontWeight:700,color:"#1F4E79",fontSize:12}}>👤 ID</span><span style={{whiteSpace:"pre-line",fontFamily:"monospace",fontSize:12,color:"#333"}}>{item.loginId}</span></React.Fragment>}
                  {hasAcct&&<React.Fragment><span style={{fontWeight:700,color:"#1F4E79",fontSize:12}}>🔑 密码</span><a href={IM} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{color:"#888",fontStyle:"italic",fontSize:12}}>查看 Internal Master &gt; Prominds Tab ↗</a></React.Fragment>}
                  {item.location&&item.location!=="—"&&<React.Fragment><span style={{fontWeight:700,color:"#1F4E79",fontSize:12}}>📍 位置</span><span style={{color:"#333"}}>{item.location}</span></React.Fragment>}
                  {item.notes&&<React.Fragment><span style={{fontWeight:700,color:"#1F4E79",fontSize:12}}>📝 备注</span><span style={{whiteSpace:"pre-line",lineHeight:1.6,color:"#444"}}>{item.notes}</span></React.Fragment>}
                  <span style={{fontWeight:700,color:"#1F4E79",fontSize:12}}>🙋 卡住了找</span>
                  <span style={{color:"#111",fontWeight:700}}>{item.who}</span>
                </div>
                {item.projectLinks&&(<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #F0F4F8"}}><div style={{fontSize:11,fontWeight:700,color:"#1F4E79",marginBottom:7,textTransform:"uppercase",letterSpacing:0.5}}>直达链接</div><div style={{display:"flex",flexWrap:"wrap"}}>{item.projectLinks.map((l,i)=><Btn key={i} href={l.url}>{l.label}</Btn>)}</div></div>)}
                {item.escalation&&(<div style={{marginTop:10,padding:"9px 11px",borderRadius:7,background:"#FFFBF0",border:"1px solid #FFE0A0",fontSize:12,color:"#7A5C00"}}>⚠️ 升级前记得走「自救三步」：查SOP → 问同事 → 带方案升级</div>)}
              </div>)}
            </div>);
          })}
        </div>)}
        {results&&results.length===0&&(<div style={{textAlign:"center",padding:"48px 20px",color:"#AAA"}}><div style={{fontSize:36,marginBottom:10}}>🤔</div><div style={{fontSize:14,fontWeight:700,color:"#666"}}>没有找到相关结果</div><div style={{fontSize:12,marginTop:6,lineHeight:1.7}}>试试其他关键词，或直接找同事确认。<br/>如果这个问题应该在这里，请告知 Wenji 补充。</div></div>)}
        {!results&&(<div style={{textAlign:"center",padding:"36px 20px",color:"#BBB"}}><div style={{fontSize:36,marginBottom:10}}>👆</div><div style={{fontSize:13,color:"#999"}}>输入关键词搜索，或点击上方分类浏览</div></div>)}
        <div style={{marginTop:24,padding:"13px 15px",borderRadius:10,background:"#FFFBF0",border:"1px solid #FFE0A0",fontSize:12,color:"#7A5C00",lineHeight:1.6}}>
          <strong>⚠️ 记住：</strong> 找不到答案 ≠ 直接找上级。不要直接找 Nicsman / Mok / Louis 等等。<br/>
          正确路径：查SOP → 问同事/Wenji → 带方案升级。<br/>
          裸问题（"这个怎么做"）= 退回。
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
