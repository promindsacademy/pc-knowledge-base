  const ESCALATION_STEPS = [
    { step: 1, icon: "🔍", title: "查 SOP", desc: "打开 Internal Master 搜索关键词" },
    { step: 2, icon: "🤝", title: "问同事", desc: "找同级别 PC 或 Wenji 确认" },
    { step: 3, icon: "💡", title: "带方案升级", desc: '"我遇到X，查了Y，我建议Z"' },
  ];

  function highlightMatch(text, query) {
    if (!query || query.length < 2) return text;
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return text;
    return (
      <React.Fragment>
        {text.slice(0, idx)}
        <span style={{ background: "#FFF3CD", fontWeight: 700, padding: "0 2px", borderRadius: 2 }}>
          {text.slice(idx, idx + query.length)}
        </span>
        {text.slice(idx + query.length)}
      </React.Fragment>
    );
  }

  function App() {
    const [query, setQuery] = React.useState("");
    const [selectedCategory, setSelectedCategory] = React.useState(null);
    const [expandedItem, setExpandedItem] = React.useState(null);

    const results = React.useMemo(() => {
      if (!query && !selectedCategory) return null;
      const q = query.toLowerCase().trim();
      let items = [];
      KNOWLEDGE_BASE.forEach(cat => {
        if (selectedCategory && cat.category !== selectedCategory) return;
        cat.items.forEach(item => {
          let score = 0;
          if (q) {
            if (item.q.toLowerCase().includes(q)) score += 10;
            if (item.tags.some(t => t.includes(q))) score += 5;
            if (item.who.toLowerCase().includes(q)) score += 3;
            if (item.sop.toLowerCase().includes(q)) score += 2;
            if (item.loginId && item.loginId.toLowerCase().includes(q)) score += 4;
          } else { score = 1; }
          if (score > 0) items.push({ ...item, score, category: cat.category, icon: cat.icon });
        });
      });
      items.sort((a, b) => b.score - a.score);
      return items;
    }, [query, selectedCategory]);

    const escColor = { red: "#DC3545", yellow: "#E6A817" };
    const escLabel = { red: "🔴 升级 Mok", yellow: "🟡 升级 Louis/Wenji" };

    const LinkBtn = ({ href, children }) => (
      <a href={href} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()}
        style={{ display: "inline-block", padding: "4px 10px", borderRadius: 5, background: "#EBF3FB", color: "#1F4E79", fontSize: 12, fontWeight: 600, marginRight: 6, marginBottom: 5, border: "1px solid #C8DFF2" }}>
        {children} ↗
      </a>
    );

    return (
      <div style={{ minHeight: "100vh", background: "#F4F7FB", padding: "0 0 40px" }}>
        <div style={{ maxWidth: 520, margin: "0 auto", padding: "0 16px" }}>
          <div style={{ textAlign: "center", padding: "28px 0 16px" }}>
            <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: 2, color: "#1F4E79", textTransform: "uppercase", marginBottom: 6, opacity: 0.5 }}>PROMINDS INTERNAL</div>
            <div style={{ fontSize: 26, fontWeight: 800, color: "#1F4E79" }}>PC 自救知识库</div>
            <div style={{ fontSize: 13, color: "#888", marginTop: 6 }}>遇到问题？先查这里，再找人。</div>
          </div>

          <div style={{ background: "white", border: "1px solid #E0EAF5", borderRadius: 12, padding: "14px 16px", marginBottom: 16, boxShadow: "0 1px 4px rgba(31,78,121,0.06)" }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: "#1F4E79", marginBottom: 10, textTransform: "uppercase", letterSpacing: 1 }}>⚡ 自救三步（升级前必须完成）</div>
            <div style={{ display: "flex", gap: 8 }}>
              {ESCALATION_STEPS.map(s => (
                <div key={s.step} style={{ flex: 1, background: "#F4F7FB", borderRadius: 8, padding: "10px 6px", textAlign: "center" }}>
                  <div style={{ fontSize: 22 }}>{s.icon}</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#1F4E79", marginTop: 4 }}>{s.title}</div>
                  <div style={{ fontSize: 10, color: "#888", marginTop: 3, lineHeight: 1.4 }}>{s.desc}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ position: "relative", marginBottom: 12 }}>
            <input type="text" placeholder="输入关键词... 例如：Zoom账号、ROAS低、Clinixero、Boards登录"
              value={query} onChange={e => { setQuery(e.target.value); setExpandedItem(null); }}
              style={{ width: "100%", padding: "13px 16px 13px 42px", borderRadius: 10, border: "2px solid #D6E4F0", fontSize: 14, outline: "none", background: "white", color: "#333", boxShadow: "0 1px 4px rgba(31,78,121,0.06)" }} />
            <span style={{ position: "absolute", left: 15, top: 14, fontSize: 16, opacity: 0.35 }}>🔍</span>
            {query && (
              <button onClick={() => { setQuery(""); setExpandedItem(null); }}

            )}
          </div>

          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
            {KNOWLEDGE_BASE.map(cat => (
              <button key={cat.category}
                onClick={() => { setSelectedCategory(selectedCategory === cat.category ? null : cat.category); setExpandedItem(null); }}

                {cat.icon} {cat.category}
              </button>
            ))}
          </div>

          {results && results.length > 0 && (
            <div>
              <div style={{ fontSize: 12, color: "#999", marginBottom: 10, paddingLeft: 2 }}>

              </div>
              {results.map((item, idx) => {
                const isExpanded = expandedItem === idx;
                return (
                  <div key={idx} onClick={() => setExpandedItem(isExpanded ? null : idx)}
                    style={{ background: "white", border: item.escalation ? `1.5px solid ${escColor[item.escalation]}50` : "1.5px solid #E8EFF6", borderRadius: 10, padding: "13px 14px", marginBottom: 8, cursor: "pointer", borderLeft: item.escalation ? `4px solid ${escColor[item.escalation]}` : "1.5px solid #E8EFF6", boxShadow: "0 1px 4px rgba(31,78,121,0.05)" }}>

                        <div style={{ fontSize: 14, fontWeight: 600, color: "#222", lineHeight: 1.4 }}>

                        {item.escalation && (
                          <span style={{ display: "inline-block", marginTop: 5, padding: "2px 9px", borderRadius: 4, fontSize: 11, fontWeight: 700, background: `${escColor[item.escalation]}15`, color: escColor[item.escalation] }}>

                        )}
                      </div>
                      <span style={{ fontSize: 14, color: "#BBB", transform: isExpanded ? "rotate(180deg)" : "none", transition: "transform 0.2s", marginLeft: 8, marginTop: 2 }}>▾</span>
                    </div>

                    {isExpanded && (
                      <div style={{ marginTop: 12, paddingTop: 12, borderTop: "1px solid #F0F4F8", fontSize: 13, lineHeight: 1.7 }} onClick={e => e.stopPropagation()}>
                        <div style={{ display: "grid", gridTemplateColumns: "82px 1fr", gap: "7px 10px", alignItems: "start" }}>
                          <span style={{ fontWeight: 700, color: "#1F4E79", fontSize: 12 }}>📄 SOP</span>
                          <span style={{ color: "#333" }}>
                            {item.sop}
                            {item.sopLink && (
                              <a href={item.sopLink} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()}
                                style={{ marginLeft: 8, padding: "2px 8px", borderRadius: 4, background: "#1F4E79", color: "white", fontSize: 11, fontWeight: 700, textDecoration: "none" }}>
                                查看 →
                              </a>
                            )}
                          </span>

                          {item.url && (
                            <React.Fragment>
                              <span style={{ fontWeight: 700, color: "#1F4E79", fontSize: 12 }}>🌐 网址</span>
                              <a href={item.url} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} style={{ color: "#1F4E79", wordBreak: "break-all" }}>{item.url}</a>
                            </React.Fragment>
                          )}

                          {item.loginId && (
                            <React.Fragment>
                              <span style={{ fontWeight: 700, color: "#1F4E79", fontSize: 12 }}>👤 ID</span>
                              <span style={{ color: "#333", whiteSpace: "pre-line", fontFamily: "monospace", fontSize: 12 }}>{item.loginId}</span>
                            </React.Fragment>
                          )}

                          {(item.url || item.loginId) && (
                            <React.Fragment>
                              <span style={{ fontWeight: 700, color: "#1F4E79", fontSize: 12 }}>🔑 密码</span>
                              <a href={INTERNAL_MASTER} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()} style={{ color: "#888", fontStyle: "italic", fontSize: 12 }}>
                                查看 Internal Master &gt; Prominds Tab ↗
                              </a>
                            </React.Fragment>
                          )}

                          <span style={{ fontWeight: 700, color: "#1F4E79", fontSize: 12 }}>📍 位置</span>
                          <span style={{ color: "#333" }}>{item.location}</span>

                          {item.notes && (
                            <React.Fragment>
                              <span style={{ fontWeight: 700, color: "#1F4E79", fontSize: 12 }}>📝 备注</span>
                              <span style={{ color: "#444", whiteSpace: "pre-line", lineHeight: 1.6 }}>{item.notes}</span>
                            </React.Fragment>
                          )}

                          <span style={{ fontWeight: 700, color: "#1F4E79", fontSize: 12 }}>🙋 卡住了找</span>
                          <span style={{ color: "#111", fontWeight: 700 }}>{item.who}</span>
                        </div>

                        {item.projectLinks && (
                          <div style={{ marginTop: 10, paddingTop: 10, borderTop: "1px solid #F0F4F8" }}>
                            <div style={{ fontSize: 11, fontWeight: 700, color: "#1F4E79", marginBottom: 7, textTransform: "uppercase", letterSpacing: 0.5 }}>直达链接</div>
                            <div style={{ display: "flex", flexWrap: "wrap" }}>
                              {item.projectLinks.map((l, i) => <LinkBtn key={i} href={l.url}>{l.label}</LinkBtn>)}
                            </div>
                          </div>
                        )}

                        {item.escalation && (
                          <div style={{ marginTop: 10, padding: "9px 11px", borderRadius: 7, background: "#FFFBF0", border: "1px solid #FFE0A0", fontSize: 12, color: "#7A5C00" }}>
                            ⚠️ 升级前记得走「自救三步」：查SOP → 问同事 → 带方案升级
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {results && results.length === 0 && (
            <div style={{ textAlign: "center", padding: "48px 20px", color: "#AAA" }}>
              <div style={{ fontSize: 36, marginBottom: 10 }}>🤔</div>
              <div style={{ fontSize: 14, fontWeight: 700, color: "#666" }}>没有找到相关结果</div>
              <div style={{ fontSize: 12, marginTop: 6, lineHeight: 1.7 }}>试试其他关键词，或直接找 Wenji 确认。<br />如果这个问题应该在这里，请告知 Wenji 补充。</div>
            </div>
          )}

          {!results && (
            <div style={{ textAlign: "center", padding: "36px 20px", color: "#BBB" }}>
              <div style={{ fontSize: 36, marginBottom: 10 }}>👆</div>
              <div style={{ fontSize: 13, color: "#999" }}>输入关键词搜索，或点击上方分类浏览</div>
            </div>
          )}

          <div style={{ marginTop: 24, padding: "13px 15px", borderRadius: 10, background: "#FFFBF0", border: "1px solid #FFE0A0", fontSize: 12, color: "#7A5C00", lineHeight: 1.6 }}>
            <strong>⚠️ 记住：</strong> 找不到答案 ≠ 直接找 Mok。<br />
            正确路径：查SOP → 问同事/Wenji → 带方案升级。<br />
            裸问题（"这个怎么做"）= 退回。
          </div>
        </div>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
  </script>
</body>
</html>
