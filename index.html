    { q:"Webinar 前一天要检查什么？（Before Webinar）", sop:"Pre-Webinar Checklist", location:"Internal Master > Speaker & Course Tab", who:"Wenji 协助检查", tags:["webinar","前一天","检查","checklist","准备","zoom","reminder"], notes:"【Zoom Link 准备】\n✅ 提前1周/1个月设置\n✅ 名称：课程名 + 日期\n✅ 要有 Meeting Code + Password\n✅ 加进 Reminder 消息\n✅ 发进 Speaker / Marketing WA 群\n✅ 加进 Google Calendar\n\n【Zoom 设置】\n✅ 名称（XXX 分享会/实战/培训营）\n✅ 时间（7:45pm - 10:30pm）GMT+8\n✅ 勾选：Waiting Room + Passcode\n✅ Video：Host 看情况，Participant 默认开\n✅ Advanced：勾选 Mute participants upon entry\n\n【Pre-Zoom 额外检查】\n✅ LOGO 更新\n✅ Disable Annotation\n✅ Disable Participant Unmute Themselves\n✅ Disable AI Companion（各种小插件）\n✅ Recording 设置（Zoom Cloud / Device / OBS）\n✅ 10min Tracking Sheet（设闹钟）\n✅ Pitching Msg 准备（课程名/日期/Payment Link）\n✅ Congratz Message 准备（Last Slot / 报名名字）\n✅ 15min Opening Video 就绪\n\n【Update Speaker】\n✅ 告知 Ads Spend + 预计出席人数\n✅ Slide 修改确认\n✅ Lead Priority（Career / Buying Power / Age）\n✅ 网络 / 背景 / 仪容 / 设备确认\n\n【Reminder Message 时间点】\n✅ 个人 Blasting：12pm / 2pm\n✅ 个人 Blasting：约 8pm\n✅ WA Community：7:30pm / 7:45pm / 8pm\n✅ Zoom Waiting Room：7:45pm 前" },
    { q:"Webinar 当天操作流程？（During Webinar）", sop:"Webinar Day SOP", location:"Internal Master > Speaker & Course Tab", who:"PC 执行", tags:["webinar","当天","操作","流程","zoom","during"], notes:"【Reminder Message】\n✅ WA Community：8:10pm / 8:20pm / 8:30pm\n✅ Boost Community：8:40pm / 8:50pm / 9pm\n\n【Support Speaker】\n✅ Spotlight\n✅ Slide / Video 备用分享\n✅ Technical（Mic / Next Slide / 处理学员消息）\n\n【Zoom Support】\n✅ 15min Opening Video 流畅播放\n✅ 开始时关闭 Waiting Room\n✅ 清除 Drawings（如开了 Annotation）\n✅ Chat / Notice 互动（传达 Team Value）\n✅ 违规处理（警告 / 洗 Chat）\n\n【Attendance Tracking】\n✅ 每10分钟记录一次（设闹钟）\n✅ 备注 Stay & Drop 原因\n\n【Closing Part】\n✅ Pitching 消息（课程名 / 日期 / Payment Link）\n✅ 客服 WA（CS名字 / Link / 电话）\n✅ Congratz 消息（Last Slot / 报名名字）\n✅ WA 群更新（Link Click / PM / Sales / Target）\n\n【Q&A Part】\n✅ Spotlight 学员（叫开 Mic & Camera）\n✅ 制造紧迫感（倒数 / 剩1个名额）\n✅ 水军提问（可开 Camera）\n✅ 已付款学员分享\n✅ 引导 Q&A 学员 PM 客服\n✅ 记录 Potential 学员（用于跟进）" },

    { q:"Onboard 新讲师发什么消息？模板在哪里？", sop:"Speaker Onboarding Message Template", location:"Internal Master > Speaker & Course Tab", who:"Mok", tags:["讲师","onboarding","模板","message","新讲师","介绍"], notes:"Hi 大家好，我是 Mok From Prominds🚀\n\nProminds Team 介绍：\n• Nicsman — CEO，总决策者\n• Mok — Operation，全部运行 Flow\n• SY — Finance，所有跟钱相关\n• Louis — Performance Strategy，所有 Conversion\n• Chin Ni — Branding，设计 Guideline\n\n讲师需准备资料 Upload 到 Drive：\n1. 全身/半身专业照 (2张)\n2. 个人资料 & 资历\n3. 个人成功故事 & 成果\n4. 奖项 / 媒体采访\n5. 课程照片（20~50张）\n6. Testimonials（学员/合作伙伴）\n7. Business Page 链接\n8. 特定设计参考（如有）" },

function hi(t,q){if(!q||q.length<2)return t;const i=t.toLowerCase().indexOf(q.toLowerCase());if(i===-1)return t;return React.createElement(React.Fragment,null,t.slice(0,i),React.createElement("span",{style:{background:"#FFF3CD",fontWeight:700,padding:"0 2px",borderRadius:2}},t.slice(i,i+q.length)),t.slice(i+q.length));}

function App(){

        </div>
        <div style={{position:"relative",marginBottom:12}}>
          <input type="text" placeholder="输入关键词... 例如：Zoom账号、ROAS低、请假格式、Strive、Invoice" value={query} onChange={e=>{setQuery(e.target.value);setExp(null);}} style={{width:"100%",padding:"13px 16px 13px 42px",borderRadius:10,border:"2px solid #D6E4F0",fontSize:14,outline:"none",background:"white",color:"#333",boxShadow:"0 1px 4px rgba(31,78,121,0.06)"}}/>
          <span style={{position:"absolute",left:15,top:14,fontSize:16,opacity:0.35}}>🔍</span>
          {query&&<button onClick={()=>{setQuery("");setExp(null);}} style={{position:"absolute",right:12,top:11,background:"#eee",border:"none",borderRadius:"50%",width:24,height:24,fontSize:14,cursor:"pointer",color:"#666"}}>×</button>}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16}}>{KB.map(c=>(<button key={c.category} onClick={()=>{setCat(cat===c.category?null:c.category);setExp(null);}} style={{padding:"6px 13px",borderRadius:20,border:cat===c.category?"2px solid #1F4E79":"1.5px solid #D6E4F0",background:cat===c.category?"#1F4E79":"white",color:cat===c.category?"white":"#555",fontSize:12,fontWeight:600,cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"}}>{c.icon} {c.category}</button>))}</div>

                  <span style={{fontWeight:700,color:"#1F4E79",fontSize:12}}>🙋 卡住了找</span>
