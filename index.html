<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prominds PC 自救知识库</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F4F7FB; font-family: Arial, sans-serif; }
    input:focus { border-color: #1F4E79 !important; }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const KNOWLEDGE_BASE = [
      {
        category: "技术操作",
        icon: "🔧",
        items: [
          { q: "Zoom 设置怎么弄？", sop: "Zoom Setup SOP", location: "Internal Master > Zoom Tab", who: "Wenji", tags: ["zoom", "设置", "webinar", "链接", "会议"] },
          { q: "GHL Landing Page 怎么改？", sop: "GHL LP SOP", location: "Internal Master > GHL Tab", who: "Wenji / Zack", tags: ["ghl", "landing page", "lp", "页面", "修改"] },
          { q: "Strive WhatsApp 怎么发 Reminder？", sop: "Strive Reminder SOP", location: "Internal Master > Strive Tab", who: "Wenji", tags: ["strive", "whatsapp", "reminder", "提醒", "发送"] },
          { q: "Payment Link 怎么设置？", sop: "Payment Setup SOP", location: "Internal Master > Payment Tab", who: "Queenie / Mok", tags: ["payment", "付款", "链接", "支付"] },
          { q: "Zapier 自动化出问题了？", sop: "Zapier Troubleshoot SOP", location: "Internal Master > Zapier Tab", who: "Wenji", tags: ["zapier", "自动化", "故障", "连接", "触发"] },
        ]
      },
      {
        category: "数据 & 报表",
        icon: "📊",
        items: [
          { q: "怎么算 ROAS / CPL / CPA？", sop: "数据计算公式表", location: "Internal Master > Formula Tab", who: "Louis / Niysha", tags: ["roas", "cpl", "cpa", "计算", "公式", "数据"] },
          { q: "P&L 表格怎么填？", sop: "P&L 填写 SOP", location: "Internal Master > P&L Tab", who: "Queenie", tags: ["p&l", "pnl", "损益", "填写", "报表", "财务"] },
          { q: "广告数据在哪里看？", sop: "Agency 数据查看指引", location: "Internal Master > Ads Data Tab", who: "PC 自行后台查看", tags: ["广告", "数据", "后台", "meta", "ads", "投放"] },
          { q: "Sales Tracking 怎么更新？", sop: "Sales Tracking SOP", location: "Internal Master > Sales Tab", who: "PC 自行更新", tags: ["sales", "tracking", "销售", "追踪", "更新"] },
          { q: "Weekly Report 怎么写？", sop: "Weekly Report 模板", location: "Internal Master > Report Tab", who: "PC 自行完成", tags: ["weekly", "report", "周报", "汇报"] },
        ]
      },
      {
        category: "Webinar 执行",
        icon: "🎯",
        items: [
          { q: "Webinar 前一天要检查什么？", sop: "Pre-Zoom Checklist", location: "Internal Master > Checklist Tab", who: "Wenji 协助检查", tags: ["webinar", "前一天", "检查", "checklist", "准备"] },
          { q: "Webinar 当天操作流程？", sop: "Webinar Day SOP", location: "Internal Master > Webinar Tab", who: "PC 执行", tags: ["webinar", "当天", "操作", "流程", "zoom"] },
          { q: "怎么准备 Sales Kit？", sop: "Sales Kit SOP", location: "Internal Master > Sales Tab", who: "Louis", tags: ["sales kit", "销售", "素材", "准备", "成交"] },
          { q: "Follow Up 怎么安排？", sop: "Follow Up Strategy SOP", location: "Internal Master > Follow Up Tab", who: "Louis", tags: ["follow up", "跟单", "跟进", "安排"] },
          { q: "怎么发 Reminder 给学员？", sop: "Reminder SOP", location: "Internal Master > Reminder Tab", who: "PC 执行", tags: ["reminder", "提醒", "学员", "发送"] },
        ]
      },
      {
        category: "学生 & 课程",
        icon: "🎓",
        items: [
          { q: "学生 Onboarding 流程？", sop: "Student Onboarding SOP", location: "Internal Master > Onboarding Tab", who: "Bowie / Wenji", tags: ["学生", "onboarding", "入学", "通知", "名单"] },
          { q: "3天课程执行安排？", sop: "3-Day Course SOP", location: "Internal Master > Course Tab", who: "PC + Wenji(Event)", tags: ["课程", "3天", "安排", "执行", "event"] },
          { q: "Upsell 怎么安排？", sop: "Upsell Strategy SOP", location: "Internal Master > Upsell Tab", who: "Louis", tags: ["upsell", "追销", "课程", "策略"] },
          { q: "Closer Interview 怎么安排？", sop: "Closer Interview SOP", location: "Internal Master > Closer Tab", who: "PC 协调", tags: ["closer", "interview", "面试", "安排"] },
        ]
      },
      {
        category: "讲师 & Agency",
        icon: "🤝",
        items: [
          { q: "讲师临时改时间怎么办？", sop: "Escalation Matrix 第四章", location: "PC Escalation Matrix > Sheet ③", who: "升级给 Mok", tags: ["讲师", "改时间", "临时", "取消", "变动"], escalation: "red" },
          { q: "讲师问为什么 ROAS 这么低？", sop: "Escalation Matrix 第四章", location: "PC Escalation Matrix > Sheet ③", who: "转 Louis", tags: ["讲师", "roas", "低", "问", "不满意"], escalation: "yellow" },
          { q: "讲师发脾气 / 抱怨合作？", sop: "Escalation Matrix 第四章", location: "PC Escalation Matrix > Sheet ③", who: "升级给 Mok", tags: ["讲师", "发脾气", "抱怨", "合作", "不开心", "终止"], escalation: "red" },
          { q: "Agency 不回消息怎么办？", sop: "Escalation Matrix 第二章", location: "PC Escalation Matrix > Sheet ②", who: "先等48小时 → 升级 Wenji", tags: ["agency", "不回", "消息", "没回应", "催"], escalation: "yellow" },
          { q: "Agency 数据没更新？", sop: "Escalation Matrix 第二章", location: "PC Escalation Matrix > Sheet ②", who: "PC 先自行后台查 → 48h后升级 Wenji", tags: ["agency", "数据", "更新", "没交", "催"], escalation: "yellow" },
        ]
      },
      {
        category: "数据异常处理",
        icon: "🚨",
        items: [
          { q: "CPL 超过 Target 20% 以上？", sop: "Escalation Matrix 第三章", location: "PC Escalation Matrix > Sheet ②", who: "升级 Louis 分析", tags: ["cpl", "超过", "高", "异常", "target"], escalation: "yellow" },
          { q: "CPL 超过 Target 40% 以上？", sop: "Escalation Matrix 第三章", location: "PC Escalation Matrix > Sheet ②", who: "升级 Mok 做 Go/No-Go", tags: ["cpl", "严重", "超标", "40"], escalation: "red" },
          { q: "Show Up Rate 低于 40%？", sop: "Escalation Matrix 第三章", location: "PC Escalation Matrix > Sheet ②", who: "升级 Louis 分析原因", tags: ["show up", "出席", "低", "率", "40"], escalation: "yellow" },
          { q: "Show Up Rate 低于 30%？", sop: "Escalation Matrix 第三章", location: "PC Escalation Matrix > Sheet ②", who: "升级 Mok 沟通讲师", tags: ["show up", "出席", "很低", "30", "严重"], escalation: "red" },
          { q: "Conversion Rate 低于 15%？", sop: "Escalation Matrix 第三章", location: "PC Escalation Matrix > Sheet ②", who: "升级 Louis 优化策略", tags: ["conversion", "转化", "低", "15"], escalation: "yellow" },
          { q: "Conversion Rate 低于 10%？", sop: "Escalation Matrix 第三章", location: "PC Escalation Matrix > Sheet ②", who: "升级 Mok 判断项目方向", tags: ["conversion", "转化", "很低", "10", "严重"], escalation: "red" },
          { q: "ROAS 低于 3.0？", sop: "Escalation Matrix 第三章", location: "PC Escalation Matrix > Sheet ②", who: "升级 Louis 制定优化计划", tags: ["roas", "低", "3", "不好"], escalation: "yellow" },
          { q: "ROAS 低于 1.5 或连续2场低于 2.0？", sop: "Escalation Matrix 第三章", location: "PC Escalation Matrix > Sheet ②", who: "升级 Mok 做止损判断", tags: ["roas", "很低", "1.5", "亏损", "连续"], escalation: "red" },
          { q: "连续2场 GP 负数？", sop: "Escalation Matrix 第三章", location: "PC Escalation Matrix > Sheet ②", who: "升级 Mok 做 Go/No-Go", tags: ["gp", "亏损", "负", "连续", "赔钱"], escalation: "red" },
        ]
      },
      {
        category: "行政 & HR",
        icon: "📋",
        items: [
          { q: "Event 场地/物流问题？", sop: "Event SOP", location: "Internal Master > Event Tab", who: "Wenji", tags: ["event", "场地", "物流", "活动", "安排"] },
          { q: "面试候选人流程？", sop: "Recruitment SOP", location: "Internal Master > HR Tab", who: "Wenji 初筛", tags: ["面试", "招聘", "候选人", "hr"] },
          { q: "公司卡 Swipey 怎么用？", sop: "Swipey SOP", location: "Internal Master > Finance Tab", who: "Queenie / SY", tags: ["swipey", "公司卡", "报销", "付款"] },
        ]
      }
    ];

    const ESCALATION_STEPS = [
      { step: 1, icon: "🔍", title: "查 SOP", desc: "打开 Internal Master 搜索关键词" },
      { step: 2, icon: "🤝", title: "问同事", desc: "找同级别 PC 或 Wenji 确认" },
      { step: 3, icon: "💡", title: "带方案升级", desc: '"我遇到X，查了Y，我建议Z"' },
    ];

    function highlightMatch(text, query) {
      if (!query || query.length < 2) return text;
      const idx = text.toLowerCase().indexOf(query.toLowerCase());
      if (idx === -1) return text;
      return (
        <React.Fragment>
          {text.slice(0, idx)}
          <span style={{ background: "#FFF3CD", fontWeight: 700, padding: "0 2px", borderRadius: 2 }}>
            {text.slice(idx, idx + query.length)}
          </span>
          {text.slice(idx + query.length)}
        </React.Fragment>
      );
    }

    function App() {
      const [query, setQuery] = React.useState("");
      const [selectedCategory, setSelectedCategory] = React.useState(null);
      const [expandedItem, setExpandedItem] = React.useState(null);

      const results = React.useMemo(() => {
        if (!query && !selectedCategory) return null;
        const q = query.toLowerCase().trim();
        let items = [];
        KNOWLEDGE_BASE.forEach(cat => {
          if (selectedCategory && cat.category !== selectedCategory) return;
          cat.items.forEach(item => {
            let score = 0;
            if (q) {
              if (item.q.toLowerCase().includes(q)) score += 10;
              if (item.tags.some(t => t.includes(q))) score += 5;
              if (item.who.toLowerCase().includes(q)) score += 3;
              if (item.sop.toLowerCase().includes(q)) score += 2;
            } else {
              score = 1;
            }
            if (score > 0) items.push({ ...item, score, category: cat.category, icon: cat.icon });
          });
        });
        items.sort((a, b) => b.score - a.score);
        return items;
      }, [query, selectedCategory]);

      const escColor = { red: "#DC3545", yellow: "#E6A817", green: "#28A745" };
      const escLabel = { red: "🔴 升级 Mok", yellow: "🟡 升级 Louis/Wenji" };

      return (
        <div style={{ minHeight: "100vh", background: "#F4F7FB", padding: "0 0 40px" }}>
          <div style={{ maxWidth: 520, margin: "0 auto", padding: "0 16px" }}>

            {/* Header */}
            <div style={{ textAlign: "center", padding: "28px 0 16px" }}>
              <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: 2, color: "#1F4E79", textTransform: "uppercase", marginBottom: 6, opacity: 0.6 }}>
                PROMINDS INTERNAL
              </div>
              <div style={{ fontSize: 26, fontWeight: 800, color: "#1F4E79", lineHeight: 1.2 }}>
                PC 自救知识库
              </div>
              <div style={{ fontSize: 13, color: "#888", marginTop: 6 }}>
                遇到问题？先查这里，再找人。
              </div>
            </div>

            {/* Self-help steps */}
            <div style={{
              background: "white",
              border: "1px solid #E0EAF5",
              borderRadius: 12,
              padding: "14px 16px",
              marginBottom: 16,
              boxShadow: "0 1px 4px rgba(31,78,121,0.06)"
            }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#1F4E79", marginBottom: 10, textTransform: "uppercase", letterSpacing: 1 }}>
                ⚡ 自救三步（升级前必须完成）
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                {ESCALATION_STEPS.map(s => (
                  <div key={s.step} style={{
                    flex: 1,
                    background: "#F4F7FB",
                    borderRadius: 8,
                    padding: "10px 6px",
                    textAlign: "center",
                  }}>
                    <div style={{ fontSize: 22 }}>{s.icon}</div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: "#1F4E79", marginTop: 4 }}>{s.title}</div>
                    <div style={{ fontSize: 10, color: "#888", marginTop: 3, lineHeight: 1.4 }}>{s.desc}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Search */}
            <div style={{ position: "relative", marginBottom: 12 }}>
              <input
                type="text"
                placeholder="输入问题关键词... 例如：ROAS 低、讲师、Zoom"
                value={query}
                onChange={e => { setQuery(e.target.value); setExpandedItem(null); }}
                style={{
                  width: "100%",
                  padding: "13px 16px 13px 42px",
                  borderRadius: 10,
                  border: "2px solid #D6E4F0",
                  fontSize: 14,
                  outline: "none",
                  background: "white",
                  color: "#333",
                  boxShadow: "0 1px 4px rgba(31,78,121,0.06)"
                }}
              />
              <span style={{ position: "absolute", left: 15, top: 14, fontSize: 16, opacity: 0.35 }}>🔍</span>
              {query && (
                <button
                  onClick={() => { setQuery(""); setExpandedItem(null); }}
                  style={{
                    position: "absolute", right: 12, top: 11,
                    background: "#eee", border: "none", borderRadius: "50%",
                    width: 24, height: 24, fontSize: 14, cursor: "pointer", color: "#666",
                    display: "flex", alignItems: "center", justifyContent: "center"
                  }}
                >×</button>
              )}
            </div>

            {/* Category pills */}
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 16 }}>
              {KNOWLEDGE_BASE.map(cat => (
                <button
                  key={cat.category}
                  onClick={() => {
                    setSelectedCategory(selectedCategory === cat.category ? null : cat.category);
                    setExpandedItem(null);
                  }}
                  style={{
                    padding: "6px 13px",
                    borderRadius: 20,
                    border: selectedCategory === cat.category ? "2px solid #1F4E79" : "1.5px solid #D6E4F0",
                    background: selectedCategory === cat.category ? "#1F4E79" : "white",
                    color: selectedCategory === cat.category ? "white" : "#555",
                    fontSize: 12,
                    fontWeight: 600,
                    cursor: "pointer",
                    transition: "all 0.15s",
                    boxShadow: "0 1px 3px rgba(0,0,0,0.05)"
                  }}
                >
                  {cat.icon} {cat.category}
                </button>
              ))}
            </div>

            {/* Results */}
            {results && results.length > 0 && (
              <div>
                <div style={{ fontSize: 12, color: "#999", marginBottom: 10, paddingLeft: 2 }}>
                  找到 <strong style={{ color: "#1F4E79" }}>{results.length}</strong> 个相关结果
                </div>
                {results.map((item, idx) => {
                  const isExpanded = expandedItem === idx;
                  return (
                    <div
                      key={idx}
                      onClick={() => setExpandedItem(isExpanded ? null : idx)}
                      style={{
                        background: "white",
                        border: item.escalation ? `1.5px solid ${escColor[item.escalation]}50` : "1.5px solid #E8EFF6",
                        borderRadius: 10,
                        padding: "13px 14px",
                        marginBottom: 8,
                        cursor: "pointer",
                        borderLeft: item.escalation ? `4px solid ${escColor[item.escalation]}` : "1.5px solid #E8EFF6",
                        boxShadow: "0 1px 4px rgba(31,78,121,0.05)",
                        transition: "box-shadow 0.15s"
                      }}
                    >
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 14, fontWeight: 600, color: "#222", lineHeight: 1.4 }}>
                            {item.icon} {highlightMatch(item.q, query)}
                          </div>
                          {item.escalation && (
                            <span style={{
                              display: "inline-block",
                              marginTop: 5,
                              padding: "2px 9px",
                              borderRadius: 4,
                              fontSize: 11,
                              fontWeight: 700,
                              background: `${escColor[item.escalation]}15`,
                              color: escColor[item.escalation],
                            }}>
                              {escLabel[item.escalation]}
                            </span>
                          )}
                        </div>
                        <span style={{
                          fontSize: 14, color: "#BBB",
                          transform: isExpanded ? "rotate(180deg)" : "none",
                          transition: "transform 0.2s",
                          marginLeft: 8, marginTop: 2
                        }}>▾</span>
                      </div>

                      {isExpanded && (
                        <div style={{
                          marginTop: 12,
                          paddingTop: 12,
                          borderTop: "1px solid #F0F4F8",
                          fontSize: 13,
                          lineHeight: 1.7
                        }}>
                          <div style={{ display: "grid", gridTemplateColumns: "72px 1fr", gap: "6px 10px" }}>
                            <span style={{ fontWeight: 700, color: "#1F4E79", fontSize: 12 }}>📄 SOP</span>
                            <span style={{ color: "#333" }}>{item.sop}</span>
                            <span style={{ fontWeight: 700, color: "#1F4E79", fontSize: 12 }}>📍 位置</span>
                            <span style={{ color: "#333" }}>{item.location}</span>
                            <span style={{ fontWeight: 700, color: "#1F4E79", fontSize: 12 }}>👤 找谁</span>
                            <span style={{ color: "#111", fontWeight: 700 }}>{item.who}</span>
                          </div>
                          {item.escalation && (
                            <div style={{
                              marginTop: 10,
                              padding: "9px 11px",
                              borderRadius: 7,
                              background: "#FFFBF0",
                              border: "1px solid #FFE0A0",
                              fontSize: 12,
                              color: "#7A5C00"
                            }}>
                              ⚠️ 升级前记得走「自救三步」：查SOP → 问同事 → 带方案升级
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {results && results.length === 0 && (
              <div style={{ textAlign: "center", padding: "48px 20px", color: "#AAA" }}>
                <div style={{ fontSize: 36, marginBottom: 10 }}>🤔</div>
                <div style={{ fontSize: 14, fontWeight: 700, color: "#666" }}>没有找到相关结果</div>
                <div style={{ fontSize: 12, marginTop: 6, lineHeight: 1.7 }}>
                  试试其他关键词，或直接找 Wenji 确认。<br />
                  如果这个问题应该在这里，请告知 Wenji 补充。
                </div>
              </div>
            )}

            {!results && (
              <div style={{ textAlign: "center", padding: "36px 20px", color: "#BBB" }}>
                <div style={{ fontSize: 36, marginBottom: 10 }}>👆</div>
                <div style={{ fontSize: 13, color: "#999" }}>
                  输入关键词搜索，或点击上方分类浏览
                </div>
              </div>
            )}

            {/* Footer */}
            <div style={{
              marginTop: 24,
              padding: "13px 15px",
              borderRadius: 10,
              background: "#FFFBF0",
              border: "1px solid #FFE0A0",
              fontSize: 12,
              color: "#7A5C00",
              lineHeight: 1.6
            }}>
              <strong>⚠️ 记住：</strong> 找不到答案 ≠ 直接找 Mok。<br />
              正确路径：查SOP → 问同事/Wenji → 带方案升级。<br />
              裸问题（"这个怎么做"）= 退回。
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
